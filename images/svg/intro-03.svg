    <text x="1680" y="442" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">2026.4 / NOW</text>
    <text x="1680" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">いまここ</text>
