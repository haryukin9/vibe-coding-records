    <text x="1680" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">5</text>
  </g>

  <!-- 矢印 1->2 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="404" y1="594" x2="436" y2="594"/>
    <polyline points="430,587 442,594 430,601"/>
  </g>
  <!-- 矢印 2->3 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="764" y1="594" x2="796" y2="594"/>
    <polyline points="790,587 802,594 790,601"/>
  </g>
  <!-- 矢印 3->4 -->
  <g stroke="#a8d4ee" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="1124" y1="594" x2="1156" y2="594"/>
    <polyline points="1150,587 1162,594 1150,601"/>
  </g>
  <!-- 矢印 4->5 (オレンジで現在地強調) -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none">
    <line x1="1484" y1="594" x2="1516" y2="594"/>
    <polyline points="1510,587 1522,594 1510,601"/>
  </g>

  <!-- フッター：次回予告 -->
  <g>
    <rect x="700" y="970" width="520" height="56" rx="28" fill="#ffffff" stroke="#d8e7f2" stroke-width="1.5"/>
    <circle cx="730" cy="998" r="5" fill="#5da8d4"/>
    <text x="752" y="998" dominant-baseline="central" fill="#3a7ba8" font-weight="600" font-size="22" letter-spacing="0.8">次回はカード②「3週間の作り直し」を3話で</text>
  </g>
