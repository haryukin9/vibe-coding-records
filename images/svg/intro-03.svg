  <g>
    <rect x="1160" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="1160" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="1275" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(1300, 350)" stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
