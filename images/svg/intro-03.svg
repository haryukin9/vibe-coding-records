<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="#f8f9fa"/>

  <!-- ヘッダー -->
  <text x="80" y="80" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="4" dominant-baseline="hanging">VIBE-CODING TIMELINE</text>
  <text x="80" y="112" font-weight="700" font-size="48" dominant-baseline="hanging">
    <tspan fill="#1f2937">半年で起きたこと、</tspan><tspan fill="#3a7ba8">ざっくりタイムライン</tspan>
  </text>
  <text x="1840" y="80" text-anchor="end" fill="#6b7280" font-weight="500" font-size="22" dominant-baseline="hanging">2025.11 - 2026.04</text>
  <text x="1840" y="116" text-anchor="end" fill="#3a7ba8" font-weight="700" font-size="32" letter-spacing="1.4" dominant-baseline="hanging">14 TOOLS BUILT</text>

  <!-- カード1 : 2025.11 きっかけ -->
  <g>
    <rect x="80" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="80" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="195" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <text x="240" y="380" text-anchor="middle" font-size="44" fill="#3a7ba8" font-weight="700" dominant-baseline="central">★</text>
    <text x="240" y="442" text-anchor="middle" fill="#5da8d4" font-weight="600" font-size="22" letter-spacing="1.2" dominant-baseline="hanging">2025.11</text>
    <text x="240" y="490" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="30" dominant-baseline="hanging">きっかけと試作</text>
    <rect x="222" y="552" width="36" height="2" rx="1" fill="#a8d4ee"/>
    <text x="240" y="580" text-anchor="middle" fill="#4b5563" font-weight="400" font-size="20" dominant-baseline="hanging">
      <tspan x="240" dy="0">Geminiに「LP作って」</tspan>
      <tspan x="240" dy="32">スクレイピングや</tspan>
      <tspan x="240" dy="32">小さな業務システムを試作</tspan>
      <tspan x="240" dy="48" font-weight="600" fill="#3a7ba8">「これ、行けそうだな」</tspan>
    </text>
    <circle cx="240" cy="274" r="30" fill="#a8d4ee"/>
    <text x="240" y="274" text-anchor="middle" dominant-baseline="central" fill="#ffffff" font-weight="700" font-size="30">1</text>
  </g>

  <!-- カード2 : 2025.11後半-12.15 サイト作り直し -->
  <g>
    <rect x="440" y="280" width="320" height="640" rx="12" fill="#3a7ba8" opacity="0.10" filter="url(#softShadow)"/>
    <rect x="440" y="274" width="320" height="640" rx="12" fill="#ffffff" stroke="#ecf2f7" stroke-width="1"/>
    <rect x="555" y="324" width="90" height="90" rx="14" fill="#eaf4fb"/>
    <g transform="translate(580, 350)" stroke="#3a7ba8" stroke-width="2.5" fill="none" stroke-linecap="round">
