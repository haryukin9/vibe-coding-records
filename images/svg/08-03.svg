<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">実績DBと施策の履歴を、同じテーブルに乗せる</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- テーブル土台 -->
  <g transform="translate(80, 200)">
    <rect x="0" y="40" width="1120" height="280" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>
    <rect x="0" y="40" width="1120" height="44" rx="14" fill="#a8d4ee"/>
    <text x="32" y="62" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="18">同じテーブルの上に並ぶ</text>

    <!-- カラム1：実績DB -->
    <g transform="translate(40, 110)">
      <rect x="0" y="0" width="320" height="180" rx="10" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
      <text x="20" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="16">実績DB</text>
      <text x="20" y="42" dominant-baseline="hanging" fill="#6b7280" font-size="12">過去案件 / 公開・非公開フラグ</text>

      <rect x="20" y="76" width="280" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="36" cy="87" r="3.5" fill="#22c55e"/>
      <line x1="50" y1="87" x2="240" y2="87" stroke="#fde6c1" stroke-width="1.5"/>

      <rect x="20" y="106" width="280" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="36" cy="117" r="3.5" fill="#22c55e"/>
      <line x1="50" y1="117" x2="220" y2="117" stroke="#fde6c1" stroke-width="1.5"/>

      <rect x="20" y="136" width="280" height="22" rx="3" fill="#fff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,2"/>
      <circle cx="36" cy="147" r="3.5" fill="#9ca3af"/>
      <line x1="50" y1="147" x2="200" y2="147" stroke="#e5e7eb" stroke-width="1.5"/>
    </g>

    <!-- カラム2：数字（GA4 / SC） -->
    <g transform="translate(400, 110)">
      <rect x="0" y="0" width="320" height="180" rx="10" fill="#eff6fb" stroke="#3a7ba8" stroke-width="2"/>
      <text x="20" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="16">数字（第7話）</text>
      <text x="20" y="42" dominant-baseline="hanging" fill="#6b7280" font-size="12">GA4 / Search Console</text>

      <!-- バーチャート -->
      <g transform="translate(36, 100)">
        <line x1="0" y1="60" x2="160" y2="60" stroke="#3a7ba8" stroke-width="1.5"/>
        <line x1="0" y1="60" x2="0" y2="0" stroke="#3a7ba8" stroke-width="1.5"/>
        <rect x="14" y="36" width="20" height="24" fill="#a8d4ee"/>
        <rect x="44" y="22" width="20" height="38" fill="#a8d4ee"/>
        <rect x="74" y="14" width="20" height="46" fill="#a8d4ee"/>
        <rect x="104" y="6" width="20" height="54" fill="#f59e0b"/>
        <rect x="134" y="20" width="20" height="40" fill="#a8d4ee"/>
      </g>
    </g>

    <!-- カラム3：施策の履歴 -->
    <g transform="translate(760, 110)">
      <rect x="0" y="0" width="320" height="180" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
      <text x="20" y="20" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="16">施策の履歴</text>
      <text x="20" y="42" dominant-baseline="hanging" fill="#6b7280" font-size="12">AIセッションの概要＋タイムスタンプ</text>

      <rect x="20" y="76" width="280" height="22" rx="3" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="32" y="91" fill="#6b7280" font-size="11" font-weight="700" dominant-baseline="central">2026-04-29</text>
      <line x1="120" y1="91" x2="290" y2="91" stroke="#e5e7eb" stroke-width="1.5"/>

      <rect x="20" y="106" width="280" height="22" rx="3" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="32" y="121" fill="#6b7280" font-size="11" font-weight="700" dominant-baseline="central">2026-04-30</text>
      <line x1="120" y1="121" x2="280" y2="121" stroke="#e5e7eb" stroke-width="1.5"/>

      <rect x="20" y="136" width="280" height="22" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="1.8"/>
      <text x="32" y="151" fill="#1f2937" font-size="11" font-weight="700" dominant-baseline="central">2026-05-01</text>
      <line x1="120" y1="151" x2="290" y2="151" stroke="#fde6c1" stroke-width="1.5"/>
    </g>
  </g>

  <!-- AIエージェント -->
  <g transform="translate(640, 510)">
    <rect x="-60" y="-26" width="120" height="40" rx="10" fill="#fef3e2" stroke="#3a7ba8" stroke-width="2.5"/>
    <polygon points="-12,14 0,14 -6,24" fill="#fef3e2" stroke="#3a7ba8" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="-30" cy="-6" r="4" fill="#3a7ba8"/>
    <circle cx="-10" cy="-6" r="4" fill="#3a7ba8"/>
    <circle cx="10" cy="-6" r="4" fill="#3a7ba8"/>
    <circle cx="30" cy="-6" r="4" fill="#f59e0b"/>
    <text x="0" y="44" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="14">AIエージェントが3つ並べて読む</text>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="240" y="608" width="800" height="50" rx="25" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="272" cy="633" r="6" fill="#f59e0b"/>
    <text x="294" y="633" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="19" letter-spacing="0.5">実績・数字・施策が、同じ場所に集まる</text>
  </g>
</svg>
