<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">「並べる場所」から「引っ張り出す場所」へ作り直す</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- BEFORE -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" fill="#6b7280" font-weight="700" font-size="18" dominant-baseline="hanging">BEFORE：並べる場所</text>
    <rect x="0" y="34" width="500" height="280" rx="14" fill="#fff" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,4"/>

    <!-- 棚に並ぶカード -->
    <g transform="translate(20, 60)">
      <rect x="0" y="0" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="0" y="0" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="14" y1="44" x2="120" y2="44" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="14" y1="58" x2="100" y2="58" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="14" y1="72" x2="110" y2="72" stroke="#d1d5db" stroke-width="1.5"/>

      <rect x="160" y="0" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="160" y="0" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="174" y1="44" x2="280" y2="44" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="174" y1="58" x2="260" y2="58" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="174" y1="72" x2="270" y2="72" stroke="#d1d5db" stroke-width="1.5"/>

      <rect x="320" y="0" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="320" y="0" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="334" y1="44" x2="440" y2="44" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="334" y1="58" x2="420" y2="58" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="334" y1="72" x2="430" y2="72" stroke="#d1d5db" stroke-width="1.5"/>

      <rect x="0" y="106" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="0" y="106" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="14" y1="150" x2="120" y2="150" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="14" y1="164" x2="100" y2="164" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="14" y1="178" x2="110" y2="178" stroke="#d1d5db" stroke-width="1.5"/>

      <rect x="160" y="106" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="160" y="106" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="174" y1="150" x2="280" y2="150" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="174" y1="164" x2="260" y2="164" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="174" y1="178" x2="270" y2="178" stroke="#d1d5db" stroke-width="1.5"/>

      <rect x="320" y="106" width="140" height="90" rx="6" fill="#f8f9fa" stroke="#9ca3af" stroke-width="1.5"/>
      <rect x="320" y="106" width="140" height="20" rx="6" fill="#e5e7eb"/>
      <line x1="334" y1="150" x2="440" y2="150" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="334" y1="164" x2="420" y2="164" stroke="#d1d5db" stroke-width="1.5"/>
      <line x1="334" y1="178" x2="430" y2="178" stroke="#d1d5db" stroke-width="1.5"/>
    </g>

    <text x="250" y="295" text-anchor="middle" fill="#6b7280" font-weight="600" font-size="13">カタログとして並ぶだけ</text>
  </g>

  <!-- 矢印 -->
  <g transform="translate(630, 320)">
    <path d="M 0,0 L 50,0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <polygon points="48,-7 60,0 48,7" fill="#f59e0b"/>
  </g>

  <!-- AFTER -->
  <g transform="translate(700, 170)">
    <text x="0" y="0" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">AFTER：引っ張り出す場所</text>
    <rect x="0" y="34" width="500" height="280" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- 公開エッセンス層 -->
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="440" height="80" rx="10" fill="#fef3e2" stroke="#f59e0b" stroke-width="2"/>
      <rect x="14" y="14" width="14" height="14" rx="2" fill="#22c55e"/>
      <text x="38" y="22" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="14">公開エッセンス（Web側）</text>

      <rect x="14" y="42" width="120" height="28" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="22" y1="50" x2="120" y2="50" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="22" y1="58" x2="100" y2="58" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="22" y1="64" x2="110" y2="64" stroke="#fde6c1" stroke-width="1.5"/>

      <rect x="148" y="42" width="120" height="28" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="156" y1="50" x2="254" y2="50" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="156" y1="58" x2="234" y2="58" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="156" y1="64" x2="244" y2="64" stroke="#fde6c1" stroke-width="1.5"/>

      <rect x="282" y="42" width="120" height="28" rx="4" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="290" y1="50" x2="388" y2="50" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="290" y1="58" x2="368" y2="58" stroke="#fde6c1" stroke-width="1.5"/>
      <line x1="290" y1="64" x2="378" y2="64" stroke="#fde6c1" stroke-width="1.5"/>
    </g>

    <!-- 内側フル層 -->
    <g transform="translate(30, 165)">
      <rect x="0" y="0" width="440" height="100" rx="10" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,3"/>
      <rect x="14" y="14" width="14" height="14" rx="2" fill="#9ca3af"/>
      <text x="38" y="22" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="14">内側フル（社内側／非公開含む）</text>

      <rect x="14" y="42" width="120" height="44" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <line x1="22" y1="50" x2="120" y2="50" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="22" y1="58" x2="100" y2="58" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="22" y1="66" x2="110" y2="66" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="22" y1="74" x2="90" y2="74" stroke="#e5e7eb" stroke-width="1.5"/>

      <rect x="148" y="42" width="120" height="44" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <line x1="156" y1="50" x2="254" y2="50" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="156" y1="58" x2="234" y2="58" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="156" y1="66" x2="244" y2="66" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="156" y1="74" x2="220" y2="74" stroke="#e5e7eb" stroke-width="1.5"/>

      <rect x="282" y="42" width="120" height="44" rx="4" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
      <line x1="290" y1="50" x2="388" y2="50" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="290" y1="58" x2="368" y2="58" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="290" y1="66" x2="378" y2="66" stroke="#e5e7eb" stroke-width="1.5"/>
      <line x1="290" y1="74" x2="350" y2="74" stroke="#e5e7eb" stroke-width="1.5"/>
    </g>

    <text x="250" y="295" text-anchor="middle" fill="#1f2937" font-weight="600" font-size="13">出していいもの／出してはいけないものを分けて持つ</text>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="240" y="568" width="800" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="272" cy="594" r="6" fill="#f59e0b"/>
    <text x="294" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">公開エッセンスと内側フルの、二段構え</text>
  </g>
</svg>
