<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">即レスと、話しながら出せる</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- BEFORE -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" fill="#6b7280" font-weight="700" font-size="18" dominant-baseline="hanging">BEFORE</text>
    <rect x="0" y="34" width="500" height="320" rx="14" fill="#fff" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,4"/>

    <!-- 時計 -->
    <g transform="translate(250, 154)">
      <circle cx="0" cy="0" r="60" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#fde6c1" stroke-width="60" stroke-dasharray="172 377"/>
      <circle cx="0" cy="0" r="60" fill="#fff"/>
      <circle cx="0" cy="0" r="56" fill="none" stroke="#9ca3af" stroke-width="2"/>
      <line x1="0" y1="0" x2="0" y2="-40" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="28" y2="0" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="3" fill="#1f2937"/>
    </g>

    <text x="250" y="240" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="32">15〜20分／件</text>
    <text x="250" y="282" text-anchor="middle" fill="#6b7280" font-size="14">社内検索＋紹介文＋メール</text>

    <!-- 商談前準備 -->
    <g transform="translate(40, 304)">
      <rect x="0" y="0" width="420" height="32" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
      <text x="20" y="16" dominant-baseline="central" fill="#6b7280" font-size="13">商談前にタブを並べる準備：</text>
      <text x="225" y="16" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="14">毎回 15分</text>
    </g>
  </g>

  <!-- 矢印 -->
  <g transform="translate(620, 320)">
    <path d="M 0,0 L 50,0" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <polygon points="48,-7 60,0 48,7" fill="#f59e0b"/>
  </g>

  <!-- AFTER -->
  <g transform="translate(700, 170)">
    <text x="0" y="0" fill="#1f2937" font-weight="700" font-size="18" dominant-baseline="hanging">AFTER</text>
    <rect x="0" y="34" width="500" height="320" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- 稲妻アイコン -->
    <g transform="translate(250, 154)">
      <circle cx="0" cy="0" r="60" fill="#fef3e2" stroke="#f59e0b" stroke-width="3"/>
      <polygon points="-10,-32 14,-6 -2,-2 12,30 -16,2 0,-2" fill="#f59e0b" stroke="#1f2937" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <text x="250" y="240" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="32">1分以内／件</text>
    <text x="250" y="282" text-anchor="middle" fill="#6b7280" font-size="14">AIに業務目線で投げるだけ</text>

    <!-- 商談中の即出し -->
    <g transform="translate(40, 304)">
      <rect x="0" y="0" width="420" height="32" rx="6" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="20" y="16" dominant-baseline="central" fill="#1f2937" font-size="13">商談中、話しながら関連事例を即出し：</text>
      <text x="290" y="16" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="14">準備0分</text>
    </g>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="200" y="568" width="880" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="232" cy="594" r="6" fill="#f59e0b"/>
    <text x="254" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">お客さんを待たせる時間が、構造的に短くなった</text>
  </g>
</svg>
