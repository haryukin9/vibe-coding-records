<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="28" dominant-baseline="hanging">「並べる場所」から「引っ張り出す場所」へ、その先</text>
  <line x1="80" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="3"/>

  <!-- 第7話：数字を読む -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" fill="#6b7280" font-weight="700" font-size="16" dominant-baseline="hanging">第7話：数字を読む</text>
    <rect x="0" y="30" width="500" height="200" rx="14" fill="#fff" stroke="#3a7ba8" stroke-width="2"/>

    <!-- サイトの数字 -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#eff6fb" stroke="#3a7ba8" stroke-width="1.8"/>
      <text x="60" y="14" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="13" dominant-baseline="hanging">サイトの数字</text>
      <g transform="translate(20, 40)">
        <line x1="0" y1="28" x2="80" y2="28" stroke="#3a7ba8" stroke-width="1.2"/>
        <rect x="6" y="16" width="12" height="12" fill="#a8d4ee"/>
        <rect x="22" y="8" width="12" height="20" fill="#a8d4ee"/>
        <rect x="38" y="2" width="12" height="26" fill="#f59e0b"/>
        <rect x="54" y="10" width="12" height="18" fill="#a8d4ee"/>
      </g>
    </g>

    <!-- 矢印 -->
    <g transform="translate(180, 110)">
      <path d="M 0,0 L 40,0" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="38,-6 50,0 38,6" fill="#3a7ba8"/>
    </g>

    <!-- AIが読む -->
    <g transform="translate(260, 110)">
      <rect x="-50" y="-22" width="100" height="40" rx="10" fill="#fef3e2" stroke="#3a7ba8" stroke-width="2.5"/>
      <polygon points="-12,18 -2,18 -8,26" fill="#fef3e2" stroke="#3a7ba8" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="-26" cy="-2" r="3.5" fill="#3a7ba8"/>
      <circle cx="-8" cy="-2" r="3.5" fill="#3a7ba8"/>
      <circle cx="10" cy="-2" r="3.5" fill="#3a7ba8"/>
      <circle cx="28" cy="-2" r="3.5" fill="#f59e0b"/>
    </g>

    <!-- 矢印 -->
    <g transform="translate(330, 110)">
      <path d="M 0,0 L 40,0" stroke="#3a7ba8" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="38,-6 50,0 38,6" fill="#3a7ba8"/>
    </g>

    <!-- 改善提案 -->
    <g transform="translate(420, 70)">
      <rect x="0" y="0" width="60" height="80" rx="8" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.8"/>
      <line x1="10" y1="22" x2="50" y2="22" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="10" y1="34" x2="50" y2="34" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="10" y1="46" x2="46" y2="46" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="10" y1="58" x2="50" y2="58" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="10" y1="70" x2="40" y2="70" stroke="#f59e0b" stroke-width="1.5"/>
    </g>
    <text x="450" y="170" text-anchor="middle" fill="#6b7280" font-size="12">改善案</text>

    <text x="250" y="200" text-anchor="middle" fill="#6b7280" font-weight="600" font-size="13">サイトに溜まっている数字をAIに読ませる</text>
  </g>

  <!-- 第8話の延長：自分が打った手のリアクション -->
  <g transform="translate(700, 170)">
    <text x="0" y="0" fill="#1f2937" font-weight="700" font-size="16" dominant-baseline="hanging">第8話の延長：自分が打った手のリアクションを読む</text>
    <rect x="0" y="30" width="500" height="200" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- 紹介リンク with パラメータ -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="160" height="80" rx="8" fill="#fef3e2" stroke="#f59e0b" stroke-width="1.8"/>
      <text x="80" y="14" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="13" dominant-baseline="hanging">紹介リンク</text>
      <text x="80" y="36" text-anchor="middle" fill="#3a7ba8" font-family="monospace" font-size="11" dominant-baseline="hanging">/case?utm=...</text>
      <rect x="20" y="58" width="120" height="14" rx="3" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
      <text x="80" y="65" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="700" dominant-baseline="central">＋追跡パラメータ</text>
    </g>

    <!-- 矢印 -->
    <g transform="translate(220, 110)">
      <path d="M 0,0 L 40,0" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="38,-6 50,0 38,6" fill="#f59e0b"/>
    </g>

    <!-- GA4が観測 -->
    <g transform="translate(320, 70)">
      <rect x="0" y="0" width="140" height="80" rx="8" fill="#eff6fb" stroke="#3a7ba8" stroke-width="1.8"/>
      <text x="70" y="14" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="13" dominant-baseline="hanging">GA4が観測</text>
      <g transform="translate(20, 40)">
        <text x="0" y="0" fill="#6b7280" font-size="11" dominant-baseline="hanging">いつ</text>
        <text x="40" y="0" fill="#6b7280" font-size="11" dominant-baseline="hanging">何回</text>
        <text x="80" y="0" fill="#6b7280" font-size="11" dominant-baseline="hanging">どこで</text>
        <line x1="0" y1="22" x2="100" y2="22" stroke="#f59e0b" stroke-width="2"/>
      </g>
    </g>

    <text x="250" y="200" text-anchor="middle" fill="#1f2937" font-weight="600" font-size="13">こちらの動きの結果が、数字に跳ね返る</text>
  </g>

  <!-- 下のまとめ -->
  <g transform="translate(80, 410)">
    <rect x="0" y="0" width="1120" height="100" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="40" y="24" dominant-baseline="hanging" fill="#1f2937" font-weight="700" font-size="18">Webと、メールでのやりとりと、商談での反応が、すべて同じ場所に集まる</text>
    <text x="40" y="60" dominant-baseline="hanging" fill="#6b7280" font-size="14">＝ Webそのものが営業支援ツールになる、というのはここまでつながった状態</text>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="240" y="568" width="800" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="272" cy="594" r="6" fill="#f59e0b"/>
    <text x="294" y="594" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">「読む」の次は「跳ね返り」も読む</text>
  </g>
</svg>
