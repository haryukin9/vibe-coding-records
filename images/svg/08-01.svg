<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 670" width="100%" preserveAspectRatio="xMidYMid meet">
  <rect width="1280" height="670" fill="#f8f9fa"/>

  <text x="80" y="60" fill="#1f2937" font-weight="700" font-size="34" dominant-baseline="hanging">うちのWebは、ずっと「並べているだけ」だった</text>
  <line x1="80" y1="115" x2="220" y2="115" stroke="#f59e0b" stroke-width="3"/>

  <!-- 旧フローのタイムライン -->
  <g transform="translate(0, 250)">
    <!-- 横軸 -->
    <line x1="140" y1="120" x2="1140" y2="120" stroke="#9ca3af" stroke-width="2.5" stroke-dasharray="8,5"/>

    <!-- ステップ1 相談メール受信 -->
    <g transform="translate(190, 120)">
      <circle cx="0" cy="0" r="50" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <rect x="-22" y="-12" width="44" height="26" rx="2" fill="none" stroke="#3a7ba8" stroke-width="2.5"/>
      <polyline points="-22,-12 0,4 22,-12" fill="none" stroke="#3a7ba8" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="0" y="-72" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="20">相談メール</text>
      <text x="0" y="78" text-anchor="middle" fill="#6b7280" font-size="18">0分</text>
    </g>

    <!-- ステップ2 社内検索 -->
    <g transform="translate(425, 120)">
      <circle cx="0" cy="0" r="50" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
      <circle cx="-7" cy="-7" r="18" fill="none" stroke="#9ca3af" stroke-width="3"/>
      <line x1="6" y1="6" x2="22" y2="22" stroke="#9ca3af" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="-72" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="20">社内を漁る</text>
      <text x="0" y="78" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="20">5〜10分</text>
    </g>

    <!-- ステップ3 候補確認 -->
    <g transform="translate(660, 120)">
      <circle cx="0" cy="0" r="50" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
      <rect x="-20" y="-20" width="40" height="40" rx="3" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
      <line x1="-13" y1="-10" x2="13" y2="-10" stroke="#9ca3af" stroke-width="2.2"/>
      <line x1="-13" y1="0" x2="13" y2="0" stroke="#9ca3af" stroke-width="2.2"/>
      <line x1="-13" y1="10" x2="8" y2="10" stroke="#9ca3af" stroke-width="2.2"/>
      <text x="0" y="-72" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="20">候補確認</text>
    </g>

    <!-- ステップ4 紹介文 -->
    <g transform="translate(895, 120)">
      <circle cx="0" cy="0" r="50" fill="#fff" stroke="#9ca3af" stroke-width="3"/>
      <rect x="-20" y="-24" width="40" height="42" rx="3" fill="none" stroke="#9ca3af" stroke-width="2.5"/>
      <line x1="-13" y1="-13" x2="13" y2="-13" stroke="#9ca3af" stroke-width="2.2"/>
      <line x1="-13" y1="-4" x2="13" y2="-4" stroke="#9ca3af" stroke-width="2.2"/>
      <line x1="-13" y1="5" x2="13" y2="5" stroke="#9ca3af" stroke-width="2.2"/>
      <line x1="-13" y1="14" x2="8" y2="14" stroke="#9ca3af" stroke-width="2.2"/>
      <text x="0" y="-72" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="20">紹介文を書く</text>
      <text x="0" y="78" text-anchor="middle" fill="#f59e0b" font-weight="700" font-size="20">10分</text>
    </g>

    <!-- ステップ5 送信 -->
    <g transform="translate(1130, 120)">
      <circle cx="0" cy="0" r="50" fill="#fff" stroke="#3a7ba8" stroke-width="3"/>
      <polygon points="-22,-15 22,0 -22,15 -12,0" fill="#a8d4ee" stroke="#3a7ba8" stroke-width="2.5" stroke-linejoin="round"/>
      <text x="0" y="-72" text-anchor="middle" fill="#1f2937" font-weight="700" font-size="20">送信</text>
    </g>

    <!-- 合計バー -->
    <g transform="translate(0, 240)">
      <rect x="140" y="0" width="1000" height="56" rx="28" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
      <text x="180" y="28" dominant-baseline="central" fill="#6b7280" font-weight="700" font-size="22">合計</text>
      <text x="640" y="28" text-anchor="middle" dominant-baseline="central" fill="#1f2937" font-weight="700" font-size="32">最短でも 15〜20分／1件</text>
    </g>
  </g>

  <!-- フッターキャッチ -->
  <g>
    <rect x="200" y="588" width="880" height="52" rx="26" fill="#fff" stroke="#fde6c1" stroke-width="1.5"/>
    <circle cx="232" cy="614" r="6" fill="#f59e0b"/>
    <text x="254" y="614" dominant-baseline="central" fill="#1f2937" font-weight="600" font-size="20" letter-spacing="0.5">過去案件の引っ張り出しに、毎回15〜20分かかっていた</text>
  </g>
</svg>
